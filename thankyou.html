<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お申し込みありがとうございます｜じゃがいも植えと楽しむ会</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#3a5a32;
  --green-light:#5e8c54;
  --green-pale:#e8f0e4;
  --brown-light:#a08060;
  --cream:#faf6ef;
  --text:#2d2a24;
  --text-light:#5a5448;
}
body{
  font-family:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN",sans-serif;
  color:var(--text);background:var(--cream);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:40px 24px;
}
.card{
  max-width:480px;width:100%;
  background:#fff;border-radius:24px;
  padding:48px 36px;text-align:center;
  box-shadow:0 4px 32px rgba(0,0,0,0.08);
}
.icon{
  font-size:2.8rem;margin-bottom:20px;
}
.title{
  font-family:"Noto Serif JP",serif;
  font-size:1.5rem;font-weight:500;
  color:var(--green);line-height:1.7;
  margin-bottom:24px;letter-spacing:.04em;
}
.body{
  font-size:.95rem;line-height:2.1;
  color:var(--text-light);margin-bottom:16px;
}
.divider{
  width:40px;height:1px;background:#ddd5c5;
  margin:32px auto;
}
.note{
  font-size:.82rem;color:var(--text-light);
  line-height:2;background:var(--green-pale);
  border-radius:12px;padding:20px 24px;
  text-align:left;margin-top:24px;
}
.back-link{
  display:inline-block;margin-top:32px;
  color:var(--green-light);font-size:.88rem;
  text-decoration:none;border-bottom:1px solid var(--green-light);
  padding-bottom:2px;
}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🌿</div>
  <h1 class="title">
    お申し込みありがとうございます。
  </h1>
  <p class="body">
    奥八ヶ岳でお会いできるのを、<br>
    楽しみにしています。
  </p>
  <p class="body">
    土にふれて、語って、ゆるむ。<br>
    そんな時間を一緒に過ごしましょう。
  </p>
  <div class="divider"></div>
  <div class="note">
    <p>📩 ご登録のメールアドレスに<br>お支払い完了の確認メール（領収書）が届きます。</p>
    <br>
    <p>📅 開催の1週間前頃に、<br>当日の詳細をご案内いたします。</p>
    <br>
    <p>ご不明な点は下記までご連絡ください。<br>
    <a href="mailto:info@living-in-nature.jp" style="color:var(--green);text-decoration:none;">info@living-in-nature.jp</a></p>
  </div>
  <a href="index.html" class="back-link">← イベントページに戻る</a>
</div>
</body>
</html>
