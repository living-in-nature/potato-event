<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深山からひとこと｜八ヶ岳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
:root{
  --green:#3a5a32;
  --green-light:#5e8c54;
  --green-pale:#e8f0e4;
  --cream:#faf6ef;
  --cream-dark:#f0ebe0;
  --white:#ffffff;
  --text:#2d2a24;
  --text-light:#5a5448;
  --border:#ddd5c5;
}
body{
  font-family:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN",sans-serif;
  color:var(--text);background:var(--cream);
  line-height:2;font-size:16px;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 24px;
}
.wrap{
  max-width:520px;width:100%;
  display:flex;flex-direction:column;align-items:center;
  gap:32px;
}
.label{
  font-size:.72rem;letter-spacing:.25em;color:var(--green-light);
  text-align:center;
}
.title{
  font-family:"Noto Serif JP",serif;
  font-size:clamp(1.1rem,3vw,1.4rem);font-weight:500;
  color:var(--green);text-align:center;line-height:1.8;
  letter-spacing:.04em;
}
.video-wrap{
  width:100%;border-radius:14px;overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,.1);
  background:var(--cream-dark);
  aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;
  color:var(--text-light);font-size:.85rem;letter-spacing:.1em;
}
.video-wrap iframe{
  width:100%;height:100%;display:block;
}
.note{
  font-size:.88rem;color:var(--text-light);
  text-align:center;line-height:2;
}
.cta-btn{
  display:inline-block;
  background:var(--green);color:var(--white);
  font-size:.95rem;font-weight:500;letter-spacing:.1em;
  padding:16px 40px;border-radius:100px;
  text-decoration:none;transition:all .3s;
  box-shadow:0 4px 20px rgba(0,0,0,.12);
  text-align:center;
}
.cta-btn:hover{background:var(--green-light);transform:translateY(-2px)}
.cta-note{
  font-size:.78rem;color:var(--text-light);
  text-align:center;margin-top:10px;
}
footer{
  margin-top:48px;
  font-size:.75rem;color:var(--text-light);text-align:center;
}
</style>
</head>
<body>

<div class="wrap">

  <div>
    <p class="label">MESSAGE FROM YOSHIHITO</p>
  </div>

  <h1 class="title">
    なぜ今、八ヶ岳で<br>
    こういう場をつくろうとしているのか。
  </h1>

  <!-- ★ 動画差し替え：YouTubeにアップ後、VIDEO_IDを書き換える -->
  <div class="video-wrap">
    動画：準備中
    <!-- アップ後はこちらを使用：
    <iframe
      src="https://www.youtube.com/embed/VIDEO_ID"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
    -->
  </div>

  <p class="note">
    ゆっくり見てもらえたらうれしいです。
  </p>

  <div style="text-align:center">
    <a href="https://living-in-nature.github.io/potato-event/" class="cta-btn">
      じゃがいも植えと楽しむ会のご案内
    </a>
    <p class="cta-note">気になった方はこちらもどうぞ</p>
  </div>

</div>

<footer>© 2026 深山義人｜奥八ヶ岳</footer>

</body>
</html>
